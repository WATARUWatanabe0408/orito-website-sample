name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare deploy directory
        run: |
          mkdir -p _deploy/v2 _deploy/v3
          cp -r public/. _deploy/
          cp -r public-v2/. _deploy/v2/
          cp -r public-v3/site/. _deploy/v3/
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy
      - uses: actions/deploy-pages@v4
        id: deployment
